name: zabbix


x-logging: &default-logging
  driver: json-file
  options:
    max-size: 2M
    max-file: 10


services:
  mariadb:
    hostname: "mariadb"
    logging: *default-logging
    image: mariadb:12.3
    stop_grace_period: 5m
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: zabbix
      MARIADB_USER: zabbix
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?}
    volumes:
      - "${VOLUMES_LOCATION:?}/vol_mariadb:/var/lib/mysql:Z"
      - "${DB_BACKUP_VOL:?}:/backups"
      - "./mounted_scripts/backup.sh:/backup.sh:ro"
    expose: [ 3306 ]
    ports:
      - "${MARIADB_PORT:?}:3306"
    command:
      - "--character-set-server=utf8"
      - "--collation-server=utf8_bin"
    healthcheck:
      test: "mariadb-admin ping -h localhost --user=root --password=${MARIADB_ROOT_PASSWORD:?}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [ net_zabbix ]
  zabbix-server:
    hostname: "zabbix-server"
    logging: *default-logging
    image: zabbix/zabbix-server-mysql:alpine-7.0-latest
    stop_grace_period: 3m
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: mariadb
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:?}
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?}
    volumes:
      - "${VOLUMES_LOCATION:?}/vol_server_alertscripts:/usr/lib/zabbix/alertscripts:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_externalscripts:/usr/lib/zabbix/externalscripts:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_modules:/var/lib/zabbix/modules:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_enc:/var/lib/zabbix/enc:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_certs:/var/lib/zabbix/ssl/certs:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_keys:/var/lib/zabbix/ssl/keys:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_ssl_ca:/var/lib/zabbix/ssl/ssl_ca:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_snmptraps:/var/lib/zabbix/snmptraps:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_mibs:/var/lib/zabbix/mibs:rw"
    expose: [ 10051 ]
    ports:
      - "${ZABBIX_SERVER_PORT:?}:10051"
    networks: [ net_zabbix ]
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: "nc -z localhost 10051"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  zabbix-agent:
    hostname: "zabbix-agent"
    logging: *default-logging
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    expose: [ 10050 ]
    networks: [ net_zabbix ]
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_HOSTNAME=zabbix-server-agent
      - ZBX_TLSCONNECT=psk
      - ZBX_TLSACCEPT=psk
      - ZBX_TLSPSKIDENTITY=${ZABBIX_AGENT_PSK_IDENTITY:?}
      - ZBX_TLSPSK=${ZABBIX_AGENT_PSK:?}
    volumes:
      - "${VOLUMES_LOCATION:?}/vol_server_agent_zabbix_agentd.d:/etc/zabbix/zabbix_agentd.d:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_agent_modules:/var/lib/zabbix/modules:rw"
      - "${VOLUMES_LOCATION:?}/vol_server_agent_enc:/var/lib/zabbix/enc:rw"
    depends_on:
      zabbix-server:
        condition: service_healthy
  zabbix-web:
    hostname: "zabbix-web"
    logging: *default-logging
    image: zabbix/zabbix-web-apache-mysql:alpine-7.0-latest
    restart: unless-stopped
    environment:
      PHP_TZ: "Europe/Warsaw"
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: mariadb
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:?}
    volumes:
      - "${VOLUMES_LOCATION:?}/vol_web:/etc/ssl/apache2:rw"
    expose: [ 8080 ]
    ports:
      - "${ZABBIX_WEB_PORT:?}:8080"
    networks: [ net_zabbix ]
    depends_on:
      zabbix-server:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: "wget http://127.0.0.1:8080/ -q -S -O /dev/null 2>&1 | grep '200 OK' || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
  phpmyadmin:
    profiles: [ prof_tools ]
    hostname: "phpmyadmin"
    logging: *default-logging
    image: phpmyadmin:latest
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      # If these two values below are provided login prompt is disabled.
      # PMA_USER: root
      # PMA_PASSWORD: root_pwd
    expose: [ 80 ]
    ports:
      - "${PHPMYADMIN_PORT:?}:80"
    networks: [ net_zabbix ]
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: "wget http://127.0.0.1/ -q -S -O /dev/null 2>&1 | grep '200 OK' || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
  traefik:
    logging: *default-logging
    hostname: "traefik"
    image: "${IMAGE_TRAEFIK:-traefik}:${IMAGE_TRAEFIK_TAG:-v3}"
    volumes:
      - "./traefik_acme/:/acme/:rw"
      - "./traefik_dynamic/:/etc/traefik/dynamic/:ro"
      - "./traefik_public_certs/:/public_certs/:ro"
    command:
      - "--log.level=${TRAEFIK_LOG_LEVEL-info}"
      # - "--entryPoints.web.address=:80"
      # - "--entryPoints.web.http.redirections.entryPoint.scheme=http"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.http.redirections.entryPoint.to=websecure"
      # - "--certificatesresolvers.le.acme.email=email@example.com"
      # - "--certificatesresolvers.le.acme.storage=/acme.json"
      # - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--ping"
    stop_grace_period: 30s
    restart: unless-stopped
    networks: [ net_zabbix ]
    ports:
      # - "${TRAEFIK_HTTP_PORT:?}:80"
      - "${TRAEFIK_HTTPS_PORT:?}:443"
      - "${TRAEFIK_DASHBOARD_PORT:?}:8080"
    healthcheck:
      test: "traefik healthcheck --ping"
      interval: 10s
      timeout: 2s
      retries: 3


networks:
  net_zabbix:
